name: RadDad
channels:
  - conda-forge
dependencies:
  - python=3.9
  - pip
  - pip:
      - torch==2.3.1
      - monai==1.3.0
      - transformers==4.45.2     # pinned: newer needs torch>=2.6 for .bin SegFormer weights
      - pydicom==2.4.4
      - nibabel
      - numpy
      - scipy
      - scikit-image
      - opencv-python-headless
      - einops                   # required by MONAI SwinUNETR
      - pillow
      - tqdm
      - huggingface_hub          # to download the weights
